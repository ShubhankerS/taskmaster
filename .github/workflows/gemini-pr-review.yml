name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr.diff

      - name: Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat pr.diff | head -c 20000)

          PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            --arg title "$PR_TITLE" \
            '{
              contents: [{
                parts: [{
                  text: ("You are a senior security-aware code reviewer. Review this PR and provide concise, actionable feedback.\n\nFocus on:\n- Security issues (top priority)\n- Bugs or logic errors\n- Code quality and maintainability\n- Any obvious performance issues\n\nBe direct. Skip praise. If the code is fine, say so briefly.\n\nPR Title: " + $title + "\n\nDiff:\n" + $diff)
                }]
              }]
            }')

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "content-type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          BODY=$(printf '## Gemini PR Review\n\n%s\n\n---\n*Powered by Gemini Flash*' "$REVIEW")

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$BODY"
