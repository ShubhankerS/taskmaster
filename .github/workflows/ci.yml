name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  build:
    name: Build Check
    runs-on: ubuntu-latest
    env:
      # Dummy values — only needed so Next.js/Prisma can compile.
      # These never connect to a real database or auth provider.
      DATABASE_URL: postgresql://postgres:password@localhost:5432/taskmaster
      AUTH_SECRET: ci-dummy-secret-32-chars-minimum!!
      AUTH_GITHUB_ID: dummy-github-id
      AUTH_GITHUB_SECRET: dummy-github-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
